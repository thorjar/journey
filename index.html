<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="My data engineering journey — a timeline of career milestones." />
    <title>Journey – Career Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>My Data Engineering Journey</h1>
      <p class="subtitle">A timeline of career milestones, skills, and growth.</p>
    </header>

    <main>
      <!--
        Timeline items are injected by script.js from the data in milestones.js.
        To add or update a milestone, edit milestones.js.
      -->
      <div class="timeline" id="timeline" aria-label="Career timeline"></div>
    </main>

    <footer>
      <p>
        Open <a href="milestones.js">milestones.js</a> to add or update career milestones.
      </p>
    </footer>

    <!-- Milestone data (edit this file to update the timeline) -->
    <script src="milestones.js"></script>
    <!-- Rendering logic -->
    <script src="script.js"></script>
  </body>
</html>
